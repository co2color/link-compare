<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#14b8a6" flood-opacity="0.4" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)" />
  <!-- subtle border -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="none" stroke="rgba(45, 212, 191, 0.2)" stroke-width="4" />
  
  <!-- Icon link-2 -->
  <g transform="translate(128, 128) scale(10.666)" filter="url(#shadow)">
    <path d="M9 17H7A5 5 0 0 1 7 7h2" fill="none" stroke="url(#glow)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M15 7h2a5 5 0 1 1 0 10h-2" fill="none" stroke="url(#glow)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="8" y1="12" x2="16" y2="12" fill="none" stroke="url(#glow)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>